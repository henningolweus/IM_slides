<div class="ifd-thumb" style="background:#fff;padding:8px;display:flex;flex-direction:column;gap:3px;">

  <div style="height:2px;background:#1F1F23;width:38%;"></div>

      <div style="height:1.5px;background:#888;width:80%;"></div>
      <div style="height:1.5px;background:#888;width:65%;"></div>
      <div style="height:1.5px;background:#888;width:75%;"></div>
    </div>
    <div style="position:relative;width:44px;height:36px;">
      <div style="position:absolute;left:0;top:50%;transform:translateY(-50%);width:30px;height:30px;border:1.5px solid #B9C7C2;border-radius:50%;"></div>

    </div>
    <div style="display:flex;flex-direction:column;gap:2px;">
      <div style="height:1.5px;background:#888;width:80%;"></div>
      <div style="height:1.5px;background:#888;width:70%;"></div>
      <div style="height:1.5px;background:#888;width:75%;"></div>
    </div>
  </div>
</div>
